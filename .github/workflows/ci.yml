name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-cadmus:
    name: Build Cadmus
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:cadmus
      - name: Verify dist output
        run: |
          test -f packages/cadmus/dist/index.js
          test -f packages/cadmus/dist/index.d.ts
          test -f packages/cadmus/dist/auth/index.js
          test -f packages/cadmus/dist/db/index.js

  build-site:
    name: Build Worker 1 (Astro)
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # needs: build-cadmus only orders the jobs — each job is a fresh
      # runner with no shared filesystem, so packages/cadmus/dist/ (what
      # @bowenlabs/cadmus's package.json exports map actually resolves
      # against) doesn't exist here unless built again in this job too.
      - run: pnpm build:cadmus
      - run: pnpm build:site

  build-panel:
    name: Build Worker 2 (TanStack Start)
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # same reason as build-site above — dist/ isn't shared across jobs.
      - run: pnpm build:cadmus
      - run: pnpm build:cadmea-pkg
      - run: pnpm build:cadmea

  test-cadmus:
    name: Test Cadmus primitives
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:cadmus
