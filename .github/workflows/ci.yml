name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-cadmus:
    name: Build Cadmus
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:cadmus
      - name: Verify dist output
        run: |
          test -f packages/cadmus/dist/index.js
          test -f packages/cadmus/dist/index.d.ts
          test -f packages/cadmus/dist/auth/index.js
          test -f packages/cadmus/dist/db/index.js

  build-site:
    name: Build Worker 1 (Astro)
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # needs: build-cadmus only orders the jobs — each job is a fresh
      # runner with no shared filesystem, so every publishable package's
      # dist/ (what its package.json exports map actually resolves
      # against — site's layout.astro pulls in both
      # @thebes/cadmea-design-system and @thebes/cadmea-plugin-seo,
      # not just @thebes/cadmus) needs building again in this job too.
      # `build:packages` builds all of them, deliberately, so a future
      # package addition can't silently leave a CI job's dist/ stale the
      # way this one did.
      - run: pnpm build:packages
      - run: pnpm build:site

  build-panel:
    name: Build Worker 2 (TanStack Start)
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # same reason as build-site above — dist/ isn't shared across jobs.
      - run: pnpm build:packages
      - run: pnpm build:cadmea

  test-cadmus:
    name: Test Cadmus primitives
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:cadmus

  test-cadmea-pkg:
    name: Test Cadmea admin-UI components
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:cadmea-pkg

  test-int:
    name: Integration tests (real local D1/KV)
    runs-on: ubuntu-latest
    needs: build-cadmus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # app/cadmea.config.ts (imported by cms.test.ts/cadmea-service.test.ts)
      # pulls in @thebes/cadmea-plugin-seo, not just @thebes/cadmus —
      # see build-site's comment above for why this needs every package's
      # dist/, not just cadmus's, in every job.
      - run: pnpm build:packages
      - run: pnpm test:int

  test-e2e:
    name: E2e + accessibility (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: build-site
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm build:site
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts's webServer already runs db:migrate + seed
      # before starting `wrangler dev` — this just provides the
      # .dev.vars those scripts and the dev server both read. The
      # checked-in .dev.vars.example files ship with empty values (by
      # design, so nobody copies a real secret in), so CI needs its own
      # throwaway values rather than a blind copy.
      - name: Provide local dev secrets
        run: |
          cat > app/workers/site/.dev.vars <<EOF
          SESSION_SECRET=ci-only-session-secret-not-for-production
          ADMIN_EMAIL=owner@example.com
          MEDIA_URL=http://localhost:8788
          CADMEA_URL=http://localhost:3001
          EOF
          cat > app/workers/cadmea/.dev.vars <<EOF
          SESSION_SECRET=ci-only-session-secret-not-for-production
          ADMIN_EMAIL=owner@example.com
          MEDIA_URL=http://localhost:8788
          SERVER_URL=http://localhost:3000
          EOF
      - run: pnpm test:e2e

  bundle-size:
    name: Worker bundle size check (10MB Workers Paid limit)
    runs-on: ubuntu-latest
    needs: [build-site, build-panel]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm build:site
      - run: pnpm build:cadmea
      - name: Check thebes-site upload size
        working-directory: app/workers/site
        run: npx wrangler deploy --dry-run --outdir /tmp/dry-site
      - name: Check thebes-cadmea upload size
        working-directory: app/workers/cadmea
        run: npx wrangler deploy --dry-run --outdir /tmp/dry-cadmea
