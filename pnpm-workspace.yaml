packages:
  - 'packages/*'
  - 'app/workers/*'
  - 'examples/*'

allowBuilds:
  better-sqlite3: false
  core-js-pure: true
  esbuild: true
  sharp: true
  workerd: true

overrides:
  # Pinned below latest to clear pnpm's minimum-release-age supply-chain
  # policy (packages published <24h ago get blocked). Bump once the
  # corresponding "latest" version has aged past the cutoff.
  miniflare: '4.20260617.1'
  '@cloudflare/vite-plugin': '1.42.1'
  nanoid: '3.3.14'
